{% extends 'base.html' %}

{% block title %}{{ code  }} - {{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body text-center py-5">
                <h1 class="h4 mb-3">{{ title }}</h1>
                <form method="post">
                {% if error and error.description %}
                    <p class="text-muted">{{ error.description }}</p>
                {% else %}
                    <p class="text-muted">¡¡No se ha podido completar la acción solicitada!!</p>
                {% endif %}
                <a href="{{ url_for('products.index') }}" class="btn btn-primary">Volver al inicio</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
